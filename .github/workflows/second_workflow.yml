name: Second Workflow 

on: push # event 

jobs:
    run-first-command: #name
        runs-on: ubuntu-latest #os 
        steps:
            - name: Display Node Version on Ubuntu
              run: echo "Some Text" 
            - name: Command in Miltiline 
              run: |
                node -v
                npm -v 

    run-parallel-command:
        runs-on: windows-latest
        steps: 
            - name : Display Node Version on Windows
              run: node -v
    #по заврешнию первого job 
    run-second-command:
        runs-on: macos-latest
        needs: run-first-command 
        steps: 
            - name : Display Node Version on Mac
              run: node -v 