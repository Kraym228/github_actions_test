name: Fifteenth Workflow 
on: push 

jobs: 
    first-jobs:
        runs-on: ubuntu-latest 
        steps:
            - name: Math expression
              run: expr 2 + 2 > math-result.txt
            - name: Upload Artifact result
              uses: actions/upload-artifact@v4
              with:
                name: math-result 
                path: math-result.txt # Создали артифакт
    another-job:
        runs-on: ubuntu-latest
        needs: first-jobs
        steps:
            - name: Download Artifact result
              uses: actions/download-artifact@v4
              with:
                name: math-result

            - name: Math expression
              run: |
                value=$(cat math-result.txt)
                expr $value * 2 > math-result.txt
            - name: Upload Artifact result
              uses: actions/upload-artifact@v4
              with:
                name: math-result 
                path: math-result.txt

    second-job:
        runs-on: ubuntu-latest
        needs: another-job
        steps:
            - name: Download Artifact result
              uses: actions/download-artifact@v4
              with:
                name: math-result
                path: math-result # Скачали артифакт
            - name: Print file
              run: |
                value=$(cat math-result/math-result.txt)
                echo "$value"