name: Fourth Workflow 

on: 
    workflow_run:
        workflows: ['Thrid Workflow'] # запуск при завершении first work. Два состояния ин прогресс и в концеbranches: 
        types:
            - completed

jobs:
    success-command: #name
        runs-on: ubuntu-latest #os 
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        steps:
            - name: List Files
              run: echo 'Success'
    failure-command:
        runs-on: ubuntu-latest #os 
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        steps:
            - name: List Files
              run: echo 'Failure'