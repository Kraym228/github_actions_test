name: Sixteenth Workflow
on: [push]

jobs:
    testing-matrix-job:
        strategy:
            matrix:
                node-version: [10, 14, 18]
                os: [ubuntu-latest, windows-latest]
        runs-on: ${{matrix.os}} 
        steps: 
            - run: node -v 
            - uses: actions/setup-node@v3
              with:
                node-version: ${{matrix.node-version}}
            - run: node -v
