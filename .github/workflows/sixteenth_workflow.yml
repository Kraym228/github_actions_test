name: Sixteenth Workflow
on: [push]

jobs:
    testing-matrix-job:
        continue-on-error: true # даже если вернутся ошибки , то job вернет успех( если хоть один прошел)
        strategy:
            matrix:
                node-version: [10, 14, 18]
                os: [ubuntu-latest, windows-latest]
            fail-fast: false # если текущий job вернул неудачу, некст job отменяется. Чтобы исправить добавляем этот пункт. Будет дальше тесты запускать 
            max-parallel: 2 #одновременно будет выполняться 2
       
        runs-on: ${{matrix.os}} 
        steps: 
            - run: node -v 
            - uses: actions/setup-node@v3
              with:
                node-version: ${{matrix.node-version}}
            - run: node -v
