name: Eight Workflow 

on: 
    workflow_dispatch:
        inputs:
            titleCustom:
                description: Type the Title 
                type: string
                required: true
                default: 'Hello World'
            selectCustom:
                description: Select Value
                type: choice
                required: true 
                options:
                  - Value 1
                  - Value 2
                  - Value 3
                  - Value 4
                default: 'Value 2' 
            checkCustom:
                description: Checkbox 
                type: boolean 
                required: false
                
      
   
jobs:
    run-first-command: #name
        runs-on: ubuntu-latest #os 
        steps:
            - name: Event Vars 
              run: |
                echo "Title: ${{ inputs.titleCustom}}"
                echo "Select: ${{ inputs.selectCustom}}"
                echo "Check: ${{ inputs.checkCustom}}"
