name: Eleventh Workflow 

on: [push]
env: 
    WF_CUSTOM_VAR: WF 1


jobs:
    run-first-command: #name
        runs-on: ubuntu-latest #os 
        env: 
            JOB_CUSTOM_VAR: JOB 1
        steps:
            - name: Event Vars 
              env: 
                STEP_CUSTOM_VAR: STEP 1
                WF_CUSTOM_VAR: WF 1 - STEP 2
              run: |
                echo $GITHUB_REF
                echo '${{github.ref}}'
                echo $WF_CUSTOM_VAR
                echo '${{env.WF_CUSTOM_VAR}}' #на стороне гитхаба генер.
                echo $JOB_CUSTOM_VAR
                echo $STEP_CUSTOM_VAR
